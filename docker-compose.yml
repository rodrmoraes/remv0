version: '3.8'

services:
  rembg-api:
    build: .
    container_name: rembg-app
    restart: unless-stopped
    ports:
      - "5000:5000"  # Porta alterada
    volumes:
      - rembg_uploads:/app/uploads
      - rembg_results:/app/results
    environment:
      - MAX_UPLOAD_SIZE=10485760
      - PORT=5000  # Adicionar variável de ambiente
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

volumes:
  rembg_uploads:
  rembg_results:
