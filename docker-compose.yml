version: '3.8'

services:
  rembg-api:
    build: .
    container_name: rembg-app
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MAX_IMAGE_DIMENSION=2048        # Boa qualidade
      - MAX_UPLOAD_SIZE=10485760        # 10MB
      - OMP_NUM_THREADS=4               # Usar 4 CPUs
    deploy:
      resources:
        limits:
          memory: 4G                     # Máximo 4GB
          cpus: '4'                      # Máximo 4 CPUs
        reservations:
          memory: 2G                     # Reserva 2GB
          cpus: '2'                      # Reserva 2 CPUs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    # Logs rotacionados para não encher disco
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  rembg_uploads:
  rembg_results:
